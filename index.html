<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>实时比分</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="widget">
      <section class="view active">
        <header class="topbar">
          <div class="title-block">
            <div class="title">进行中比赛</div>
            <div class="subtitle" id="summaryText">正在加载...</div>
          </div>
          <div class="window-actions">
            <button class="icon-button" id="refreshListButton" type="button" aria-label="刷新" title="刷新">↻</button>
            <button class="icon-button minimize-button" id="minimizeButton" type="button" aria-label="最小化" title="最小化">-</button>
            <button class="icon-button close-button" id="closeButton" type="button" aria-label="关闭" title="关闭">×</button>
          </div>
        </header>

        <section class="match-list" id="matchList" aria-live="polite">
          <div class="list-message">正在加载...</div>
        </section>
      </section>

      <footer class="status">
        <span class="dot" id="statusDot"></span>
        <span id="statusText">正在连接...</span>
        <span class="refresh-time" id="refreshTime">--:--:--</span>
      </footer>
    </main>

    <script src="./renderer.js"></script>
  </body>
</html>
